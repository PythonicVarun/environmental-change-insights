<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>OlmoEarth Output Library - Insights</title>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌏</text></svg>">
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./landing/styles.css" />
        <style>
            .insights-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
            @media (max-width: 980px) {
                .insights-list {
                    grid-template-columns: 1fr;
                }
            }
            .insight-content {
                font-size: 1.05rem;
                line-height: 1.6;
                color: var(--text);
                margin-top: 4px;
                margin-bottom: 8px;
            }

            .snapshot-pair {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .snapshot {
                display: flex;
                flex-direction: column;
                gap: 8px;
                text-decoration: none;
                color: inherit;
                transition: transform 160ms ease;
            }
            .snapshot:hover {
                transform: translateY(-2px);
            }
            .snapshot-frame {
                position: relative;
                aspect-ratio: 4 / 3;
                border-radius: 18px;
                overflow: hidden;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(129, 147, 176, 0.18);
            }
            .snapshot-frame img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                transition: transform 220ms ease;
            }
            .snapshot:hover .snapshot-frame img {
                transform: scale(1.03);
            }
            .snapshot:hover .snapshot-frame {
                border-color: rgba(19, 212, 255, 0.4);
                box-shadow: 0 0 0 3px rgba(19, 212, 255, 0.12);
            }
            .snapshot-placeholder {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #70829f;
                font-size: 0.9rem;
                font-style: italic;
                background:
                    repeating-linear-gradient(
                        45deg,
                        rgba(129, 147, 176, 0.04),
                        rgba(129, 147, 176, 0.04) 10px,
                        rgba(129, 147, 176, 0.08) 10px,
                        rgba(129, 147, 176, 0.08) 20px
                    );
            }
            .snapshot-side {
                position: absolute;
                top: 10px;
                left: 10px;
                padding: 4px 10px;
                border-radius: 999px;
                background: rgba(10, 15, 22, 0.7);
                color: var(--accent);
                font-size: 0.72rem;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                backdrop-filter: blur(6px);
            }
            .snapshot-date {
                text-align: center;
                color: var(--muted);
                font-size: 0.85rem;
                font-weight: 600;
            }
        </style>
    </head>
    <body>
        <div class="shell">
            <header class="hero" style="grid-template-columns: 1fr;">
                <div class="hero-copy">
                    <div class="eyebrow">OlmoEarth Change Desk</div>
                    <h1>Environmental Change Insights</h1>
                    <p class="hero-subtitle">
                        A curated collection of major ecological disruptions and urban terraforming events detected across our study regions.
                    </p>
                </div>
            </header>

            <main>
                <section id="insights-list" class="insights-list"></section>
            </main>
        </div>
        <script src="./landing/insights.js"></script>
    </body>
</html>
